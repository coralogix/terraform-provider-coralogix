name: Acceptance Tests

on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '**/*.md'

jobs:
  test:
    name: Acceptance tests (excluding dashboards)
    permissions:
      contents: read
    env:
      GO111MODULE: on
    strategy:
      matrix:
        go-version: [ 1.25.x ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Acceptance Tests
        env:
          CORALOGIX_ENV: ${{ secrets.CORALOGIX_ENV }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
          TEST_TEAM_ID: ${{ secrets.TEST_TEAM_ID }}          
          AWS_TEST_ROLE: ${{ secrets.AWS_TEST_ROLE }}
          ARCHIVE_BUCKET: ${{ secrets.ARCHIVE_BUCKET }}
          SLACK_INTEGRATION_ID: ${{ secrets.SLACK_INTEGRATION_ID }}
          SLACK_INTEGRATION_CHANNEL: ${{ secrets.SLACK_INTEGRATION_CHANNEL }}
          SLACK_INTEGRATION_CHANNEL_UPDATED: ${{ secrets.SLACK_INTEGRATION_CHANNEL_UPDATED }}
          PD_INTEGRATION_ID: ${{ secrets.PD_INTEGRATION_ID }}
        run: |
          make testacc

  dashboard:
    name: Dashboard acceptance tests (${{ matrix.shard }})
    permissions:
      contents: read
    env:
      GO111MODULE: on
    strategy:
      fail-fast: false
      matrix:
        include:
          # Double dollar signs preserve the regexp end anchor through Make expansion.
          - shard: structured-line-and-table
            pattern: '^TestAccCoralogixResourceDashboardOpenAPIWidget(Logs|Metrics|Spans|DataPrime)Queries$$/line-and-table$$'
          - shard: structured-gauge-and-bars
            pattern: '^TestAccCoralogixResourceDashboardOpenAPIWidget(Logs|Metrics|Spans|DataPrime)Queries$$/gauge-and-bars$$'
          - shard: structured-horizontal-and-hexagon
            pattern: '^TestAccCoralogixResourceDashboardOpenAPIWidget(Logs|Metrics|Spans|DataPrime)Queries$$/horizontal-and-hexagon$$'
          - shard: presentation-resolution-and-time-frames
            pattern: '^TestAccCoralogixResourceDashboardOpenAPINestedPresentationBranches$$/resolution-and-time-frames$$'
          - shard: presentation-bar-chart-axes
            pattern: '^TestAccCoralogixResourceDashboardOpenAPINestedPresentationBranches$$/bar-chart-axes$$'
          - shard: presentation-horizontal-bar-options
            pattern: '^TestAccCoralogixResourceDashboardOpenAPINestedPresentationBranches$$/horizontal-bar-options$$'
          - shard: openapi-branches
            pattern: '^TestAccCoralogixResourceDashboardOpenAPI(OneOfTransitions|LogsAggregationBranches|SpansAndFilterBranches|VariableBranches|AnnotationBranches)$$'
          - shard: core
            pattern: '^TestAccCoralogix(DataSourceDashboard(_basic|AccessPolicy)|DataSourceDashboardsFolder_(basic|by_name)|ResourceDashboardsFolder|ResourceDashboard(ContentJSON(ProtobufSpellings|FolderOverride|DynamicQueriesTable)|RESTCreated(Hydration|UnsupportedDynamicHydration)|AccessPolicy|HexagonWidget|LinechartWidget|GaugeWidget(DataPrime|ThresholdType)?|DataTableWidget(ObservationFieldFilter)?|FromJson(WithFolder|WithVar)?|FolderIDNoDrift|MultiSelectSelectionType|LayoutColor|ManualAnnotation)?)$$'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Dashboard Acceptance Tests
        env:
          CORALOGIX_ENV: ${{ secrets.CORALOGIX_ENV }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
        run: |
          make testacc-dashboard DASHBOARD_ACC_PATTERN='${{ matrix.pattern }}'

  dashboard-migration:
    name: Dashboard provider migration (${{ matrix.shard }})
    permissions:
      contents: read
    env:
      GO111MODULE: on
    strategy:
      fail-fast: false
      matrix:
        include:
          # Double dollar signs preserve the regexp end anchor through Make expansion.
          - shard: grpc-v3.6.0
            pattern: '^TestAccCoralogixResourceDashboardMigrationFromV360$$'
          - shard: schema-v3
            pattern: '^TestAccCoralogixResourceDashboardMigrationFromSchemaV3$$'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Test pinned gRPC to current REST dashboard migration
        env:
          CORALOGIX_ENV: ${{ secrets.CORALOGIX_ENV }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
        run: |
          make testacc-dashboard-migration DASHBOARD_MIGRATION_ACC_PATTERN='${{ matrix.pattern }}'

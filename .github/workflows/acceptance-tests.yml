name: Acceptance Tests

on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '**/*.md'

jobs:
  test:
    env:
      GO111MODULE: on
    strategy:
      matrix:
        go-version: [ 1.25.x ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Acceptance Tests
        env:
          CORALOGIX_ENV: ${{ secrets.CORALOGIX_ENV }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
          TEST_TEAM_ID: ${{ secrets.TEST_TEAM_ID }}          
          AWS_TEST_ROLE: ${{ secrets.AWS_TEST_ROLE }}
          ARCHIVE_BUCKET: ${{ secrets.ARCHIVE_BUCKET }}
          SLACK_INTEGRATION_ID: ${{ secrets.SLACK_INTEGRATION_ID }}
          SLACK_INTEGRATION_CHANNEL: ${{ secrets.SLACK_INTEGRATION_CHANNEL }}
          SLACK_INTEGRATION_CHANNEL_UPDATED: ${{ secrets.SLACK_INTEGRATION_CHANNEL_UPDATED }}
          PD_INTEGRATION_ID: ${{ secrets.PD_INTEGRATION_ID }}
        run: |
          make testacc

  dashboard-migration:
    name: Dashboard provider migration
    env:
      GO111MODULE: on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Test pinned gRPC to current REST dashboard migration
        env:
          CORALOGIX_ENV: ${{ secrets.CORALOGIX_ENV }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
        run: |
          make testacc-dashboard-migration
